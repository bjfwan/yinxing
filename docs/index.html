<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>银杏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #F7F4EF;
      --warm-white: #FDFCFA;
      --gold: #B8882A;
      --gold-faint: rgba(184,136,42,0.12);
      --ink: #1C1914;
      --ink-60: rgba(28,25,20,0.6);
      --ink-30: rgba(28,25,20,0.3);
      --ink-12: rgba(28,25,20,0.12);
      --ink-06: rgba(28,25,20,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--warm-white);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 80px 32px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* ── 背景装饰层 ──────────────────── */

    /* 1. 多层光晕 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50% -5%,  rgba(184,136,42,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 55% 45% at 100% 100%, rgba(184,136,42,0.09) 0%, transparent 55%),
        radial-gradient(ellipse 45% 40% at 0%   85%,  rgba(3,105,161,0.07)  0%, transparent 50%),
        radial-gradient(ellipse 30% 30% at 20%  10%,  rgba(184,136,42,0.05) 0%, transparent 45%);
      pointer-events: none;
      z-index: 0;
    }

    /* 2. 极细点阵网格 */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(28,25,20,0.11) 1px, transparent 1px);
      background-size: 26px 26px;
      pointer-events: none;
      z-index: 0;
      mask-image: radial-gradient(ellipse 75% 75% at 50% 50%, black 10%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 75% 75% at 50% 50%, black 10%, transparent 80%);
    }

    /* 3. SVG 装饰层 */
    .deco-svg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: visible;
    }

    /* 4. 浮动银杏叶剪影 */
    .deco-leaf {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: leafFloat 20s ease-in-out infinite;
    }
    .deco-leaf:nth-child(1) { top: 8%;  right: 6%;  width: 120px; animation-delay: 0s;    animation-duration: 18s; }
    .deco-leaf:nth-child(2) { top: 55%; left: 3%;   width: 80px;  animation-delay: 4s;    animation-duration: 22s; }
    .deco-leaf:nth-child(3) { top: 78%; right: 10%; width: 60px;  animation-delay: 8s;    animation-duration: 16s; }

    @keyframes leafFloat {
      0%   { opacity: 0;    transform: translateY(0px)   rotate(0deg); }
      15%  { opacity: 0.06; }
      50%  { opacity: 0.09; transform: translateY(-18px) rotate(6deg); }
      85%  { opacity: 0.06; }
      100% { opacity: 0;    transform: translateY(0px)   rotate(0deg); }
    }

    /* 5. 顶部金色细横线 */
    .deco-topline {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(184,136,42,0.5) 50%, transparent 100%);
      z-index: 2;
    }

    /* ── 整体容器 ─────────────────────── */
    .wrap {
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    /* ── 顶部标识行 ──────────────────── */
    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 80px;
      opacity: 0;
      animation: fade 1s 0.1s ease forwards;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.95rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-60);
    }

    .brand-tag {
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-30);
      border: 1px solid var(--ink-12);
      border-radius: 2px;
      padding: 3px 10px;
    }

    /* ── 图标 ────────────────────────── */
    .icon-block {
      margin-bottom: 52px;
      opacity: 0;
      animation: fade 1s 0.25s ease forwards;
    }

    .icon-block img {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      display: block;
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 4px 16px rgba(0,0,0,0.08),
        0 20px 60px rgba(184,136,42,0.14);
    }

    /* ── 大标题 ──────────────────────── */
    .hero {
      margin-bottom: 64px;
      opacity: 0;
      animation: fade 1s 0.4s ease forwards;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(4.5rem, 14vw, 7.5rem);
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 20px;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-desc {
      font-size: 0.92rem;
      font-weight: 300;
      line-height: 1.85;
      color: var(--ink-60);
      max-width: 340px;
      letter-spacing: 0.01em;
    }

    /* ── 分隔线 ──────────────────────── */
    .rule {
      width: 100%;
      height: 1px;
      background: var(--ink-06);
      margin-bottom: 40px;
      opacity: 0;
      animation: fade 1s 0.55s ease forwards;
    }

    /* ── 规格行 ──────────────────────── */
    .specs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      margin-bottom: 40px;
      opacity: 0;
      animation: fade 1s 0.65s ease forwards;
    }

    .spec {
      padding: 20px 0;
      border-right: 1px solid var(--ink-06);
    }

    .spec:last-child { border-right: none; }
    .spec:not(:first-child) { padding-left: 20px; }

    .spec-label {
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-30);
      font-weight: 400;
      margin-bottom: 8px;
    }

    .spec-value {
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    /* ── 下载按钮 ────────────────────── */
    .dl-wrap {
      opacity: 0;
      animation: fade 1s 0.8s ease forwards;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 20px 28px;
      background: var(--ink);
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      border-radius: 4px;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: background 0.3s ease, transform 0.2s ease;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .btn:hover { background: #2E2A24; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-right {
      display: flex;
      align-items: center;
      gap: 14px;
      color: rgba(255,255,255,0.35);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
    }

    /* ── 提示 ────────────────────────── */
    .hint {
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--ink-30);
      line-height: 1.7;
      text-align: center;
      margin-bottom: 0;
    }

    /* ── 页脚 ────────────────────────── */
    .foot {
      margin-top: 72px;
      padding-top: 28px;
      border-top: 1px solid var(--ink-06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--ink-30);
      opacity: 0;
      animation: fade 1s 1s ease forwards;
    }

    .foot a {
      color: var(--ink-30);
      text-decoration: none;
      transition: color 0.2s;
    }
    .foot a:hover { color: var(--gold); }

    /* ── 动画 ────────────────────────── */
    @keyframes fade {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 响应式 ──────────────────────── */
    @media (max-width: 520px) {
      body { padding: 48px 20px 60px; justify-content: flex-start; }
      .brand { margin-bottom: 48px; }
      .hero { margin-bottom: 40px; }
      .specs { grid-template-columns: repeat(2, 1fr); }
      .spec { border-right: none; border-bottom: 1px solid var(--ink-06); }
      .spec:nth-child(odd) { border-right: 1px solid var(--ink-06); }
      .spec:last-child { border-bottom: none; }
      .spec:nth-last-child(2):nth-child(odd) { border-bottom: none; }
      .foot { flex-direction: column; gap: 10px; text-align: center; }
    }

    @media (max-width: 360px) {
      body { padding: 36px 16px 48px; }
      .hero h1 { font-size: clamp(3.5rem, 20vw, 4.5rem); }
      .btn { padding: 18px 20px; }
    }
  </style>
</head>
<body>

  <!-- 顶部金线 -->
  <div class="deco-topline"></div>

  <!-- 浮动银杏叶剪影 -->
  <img class="deco-leaf" src="./icon.png" alt="" />
  <img class="deco-leaf" src="./icon.png" alt="" />
