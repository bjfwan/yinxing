<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>银杏 · 下载</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #C8922A;
      --gold-light: #F0C96A;
      --ink: #1A1A1A;
      --ink-mid: #555;
      --ink-muted: #999;
      --rule: #E8E8E8;
      --bg: #FAFAF8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 60px 24px;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── wrapper ─── */
    .page {
      width: 100%;
      max-width: 480px;
      animation: rise 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ─── eyebrow ─── */
    .eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 48px;
    }

    .eyebrow-line {
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    .eyebrow-text {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* ─── icon ─── */
    .icon-wrap {
      margin-bottom: 32px;
    }

    .icon-wrap img {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.08),
        0 12px 40px rgba(200,146,42,0.18);
      display: block;
    }

    /* ─── heading ─── */
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 3.6rem;
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 6px;
    }

    h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .sub {
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-weight: 400;
      margin-bottom: 28px;
    }

    /* ─── desc ─── */
    .desc {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--ink-mid);
      font-weight: 300;
      max-width: 380px;
      margin-bottom: 48px;
    }

    /* ─── divider ─── */
    .divider {
      height: 1px;
      background: var(--rule);
      margin-bottom: 32px;
    }

    /* ─── meta grid ─── */
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      margin-bottom: 48px;
    }

    .meta-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--rule);
    }

    .meta-item:nth-child(odd) {
      padding-right: 24px;
      border-right: 1px solid var(--rule);
    }

    .meta-item:nth-child(even) {
      padding-left: 24px;
    }

    .meta-label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-weight: 500;
      margin-bottom: 6px;
    }

    .meta-value {
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--ink);
    }

    /* ─── download button ─── */
    .btn-wrap {
      margin-bottom: 20px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 18px 24px;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: background 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .btn:hover {
      background: #333;
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0); }

    .btn-label { display: flex; align-items: center; gap: 10px; }

    .btn-arrow {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ─── hint ─── */
    .hint {
      font-size: 0.72rem;
      color: var(--ink-muted);
      line-height: 1.6;
      text-align: center;
    }

    /* ─── footer ─── */
    .footer {
      margin-top: 52px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
    }

    .footer a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover { text-decoration: underline; }

    /* ─── gold accent dot ─── */
    .dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold);
      margin: 0 2px;
      vertical-align: middle;
    }

    /* ─── animation ─── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      h1 { font-size: 2.8rem; }
      .footer { flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="eyebrow">
      <div class="eyebrow-line"></div>
      <span class="eyebrow-text">Android Application</span>
      <div class="eyebrow-line"></div>
    </div>

    <div class="icon-wrap">
      <img src="./icon.png" alt="银杏图标" onerror="this.style.display='none'" />
    </div>

    <h1>银<em>杏</em></h1>
    <p class="sub">Yinxing Launcher</p>

    <p class="desc">专为长辈设计的简洁手机桌面。大字体、大图标、一键拨号，让科技回归温暖与简单。</p>

    <div class="divider"></div>

    <div class="meta">
      <div class="meta-item">
        <div class="meta-label">版本</div>
        <div class="meta-value">v1.0</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">大小</div>
        <div class="meta-value">1.7 MB</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">系统要求</div>
        <div class="meta-value">Android 7.0+</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">广告 / 收费</div>
        <div class="meta-value">无</div>
      </div>
    </div>

    <div class="btn-wrap">
      <a class="btn" href="./app-release.apk" download="银杏.apk">
        <span class="btn-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          下载 APK
        </span>
        <span class="btn-arrow">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </span>
      </a>
    </div>

    <p class="hint">安装前请在「设置 → 安全」中开启允许安装未知来源应用</p>

    <div class="footer">
      <span>© 2026 巴建峰</span>
      <a href="https://github.com/bjfwan/yinxing" target="_blank">GitHub →</a>
    </div>

  </div>
</body>
</html>
