<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>银杏 · 下载</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Outfit', 'Noto Sans SC', sans-serif;
      background: #0D1A12;
      color: #F5EDCF;
      overflow-x: hidden;
    }

    /* 背景光晕：金黄顶部 + 中蓝底部，与图标渐变呼应 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 65% 45% at 50% -5%, rgba(245,158,11,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 50% 105%, rgba(3,105,161,0.28) 0%, transparent 55%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(255,246,210,0.05);
      border: 1px solid rgba(245,158,11,0.18);
      border-radius: 24px;
      padding: 40px 36px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(245,158,11,0.06);
      animation: fadeUp 0.5s ease both;
    }

    /* 顶部装饰线：金黄色 */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245,158,11,0.7), transparent);
      border-radius: 1px;
    }

    .tag {
      display: inline-block;
      background: rgba(245,158,11,0.12);
      color: #F59E0B;
      border: 1px solid rgba(245,158,11,0.28);
      border-radius: 50px;
      padding: 4px 14px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    h1 span {
      background: linear-gradient(135deg, #FFF6D2 0%, #F59E0B 50%, #0369A1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .desc {
      color: #A89060;
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    /* 信息列表 */
    .info {
      background: rgba(245,158,11,0.04);
      border: 1px solid rgba(245,158,11,0.12);
      border-radius: 14px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid rgba(245,158,11,0.08);
    }
    .info-row:last-child { border-bottom: none; }

    .info-key {
      font-size: 0.8rem;
      color: #6B5A35;
    }

    .info-val {
      font-size: 0.82rem;
      font-weight: 600;
      color: #D4B87A;
    }

    /* 下载按钮：金黄→中蓝，与图标渐变完全一致 */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #F59E0B 0%, #D97706 40%, #0369A1 100%);
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 8px 32px rgba(245,158,11,0.30);
      cursor: pointer;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .hint {
      margin-top: 14px;
      text-align: center;
      font-size: 0.72rem;
      color: #4A3B20;
      line-height: 1.6;
    }

    .footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(245,158,11,0.1);
      text-align: center;
      font-size: 0.72rem;
      color: #4A3B20;
    }

    .footer a { color: #F59E0B; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { padding: 32px 24px; }
      h1 { font-size: 1.9rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">Android · 免费</div>
    <h1>银杏<br/><span>Yinxing Launcher</span></h1>
    <p class="desc">专为长辈设计的简洁手机桌面，大字体、大图标、一键拨号。</p>

    <div class="info">
      <div class="info-row">
        <span class="info-key">版本</span>
        <span class="info-val">v1.0</span>
      </div>
      <div class="info-row">
        <span class="info-key">大小</span>
        <span class="info-val">1.7 MB</span>
      </div>
      <div class="info-row">
        <span class="info-key">系统要求</span>
        <span class="info-val">Android 7.0+</span>
      </div>
      <div class="info-row">
        <span class="info-key">广告 / 收费</span>
        <span class="info-val">无</span>
      </div>
    </div>

    <a class="btn" href="./app-release.apk" download="银杏.apk">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      立即下载 APK
    </a>

    <p class="hint">安装前请在「设置 → 安全」中开启允许安装未知来源应用</p>

    <div class="footer">
      © 2026 巴建峰 ·
      <a href="https://github.com/bjfwan/yinxing" target="_blank">GitHub 开源</a>
    </div>
  </div>
</body>
</html>
