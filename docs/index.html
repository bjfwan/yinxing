<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>银杏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #F7F4EF;
      --warm-white: #FDFCFA;
      --gold: #B8882A;
      --gold-faint: rgba(184,136,42,0.12);
      --ink: #1C1914;
      --ink-60: rgba(28,25,20,0.6);
      --ink-30: rgba(28,25,20,0.3);
      --ink-12: rgba(28,25,20,0.12);
      --ink-06: rgba(28,25,20,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--warm-white);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 32px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* 极细噪点纹理 */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    }

    /* ── 整体容器 ─────────────────────── */
    .wrap {
      width: 100%;
      max-width: 560px;
    }

    /* ── 顶部标识行 ──────────────────── */
    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 80px;
      opacity: 0;
      animation: fade 1s 0.1s ease forwards;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.95rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-60);
    }

    .brand-tag {
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-30);
      border: 1px solid var(--ink-12);
      border-radius: 2px;
      padding: 3px 10px;
    }

    /* ── 图标 ────────────────────────── */
    .icon-block {
      margin-bottom: 52px;
      opacity: 0;
      animation: fade 1s 0.25s ease forwards;
    }

    .icon-block img {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      display: block;
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 4px 16px rgba(0,0,0,0.08),
        0 20px 60px rgba(184,136,42,0.14);
    }

    /* ── 大标题 ──────────────────────── */
    .hero {
      margin-bottom: 64px;
      opacity: 0;
      animation: fade 1s 0.4s ease forwards;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(4.5rem, 14vw, 7.5rem);
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 20px;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-desc {
      font-size: 0.92rem;
      font-weight: 300;
      line-height: 1.85;
      color: var(--ink-60);
      max-width: 340px;
      letter-spacing: 0.01em;
    }

    /* ── 分隔线 ──────────────────────── */
    .rule {
      width: 100%;
      height: 1px;
      background: var(--ink-06);
      margin-bottom: 40px;
      opacity: 0;
      animation: fade 1s 0.55s ease forwards;
    }

    /* ── 规格行 ──────────────────────── */
    .specs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      margin-bottom: 40px;
      opacity: 0;
      animation: fade 1s 0.65s ease forwards;
    }

    .spec {
      padding: 20px 0;
      border-right: 1px solid var(--ink-06);
    }

    .spec:last-child { border-right: none; }
    .spec:not(:first-child) { padding-left: 20px; }

    .spec-label {
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-30);
      font-weight: 400;
      margin-bottom: 8px;
    }

    .spec-value {
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    /* ── 下载按钮 ────────────────────── */
    .dl-wrap {
      opacity: 0;
      animation: fade 1s 0.8s ease forwards;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 20px 28px;
      background: var(--ink);
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      border-radius: 4px;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: background 0.3s ease, transform 0.2s ease;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .btn:hover { background: #2E2A24; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-right {
      display: flex;
      align-items: center;
      gap: 14px;
      color: rgba(255,255,255,0.35);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
    }

    /* ── 提示 ────────────────────────── */
    .hint {
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--ink-30);
      line-height: 1.7;
      text-align: center;
      margin-bottom: 0;
    }

    /* ── 页脚 ────────────────────────── */
    .foot {
      margin-top: 72px;
      padding-top: 28px;
      border-top: 1px solid var(--ink-06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--ink-30);
      opacity: 0;
      animation: fade 1s 1s ease forwards;
    }

    .foot a {
      color: var(--ink-30);
      text-decoration: none;
      transition: color 0.2s;
    }
    .foot a:hover { color: var(--gold); }

    /* ── 动画 ────────────────────────── */
    @keyframes fade {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 响应式 ──────────────────────── */
    @media (max-width: 520px) {
      body { padding: 60px 24px; }
      .brand { margin-bottom: 56px; }
      .hero { margin-bottom: 48px; }
      .specs { grid-template-columns: repeat(2, 1fr); }
      .spec { border-right: none; border-bottom: 1px solid var(--ink-06); }
      .spec:nth-child(odd) { border-right: 1px solid var(--ink-06); }
      .spec:last-child { border-bottom: none; }
      .spec:nth-last-child(2):nth-child(odd) { border-bottom: none; }
      .foot { flex-direction: column; gap: 10px; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="brand">
      <span class="brand-name">银杏</span>
      <span class="brand-tag">Free · No Ads</span>
    </div>

    <div class="icon-block">
      <img src="./icon.png" alt="银杏" onerror="this.style.display='none'" />
    </div>

    <div class="hero">
      <h1>银<em>杏</em></h1>
      <p class="hero-desc">专为长辈设计的简洁桌面。大字体、大图标、一键拨号，让科技回归温暖与简单。</p>
    </div>

    <div class="rule"></div>

    <div class="specs">
      <div class="spec">
        <div class="spec-label">版本</div>
        <div class="spec-value">1.0</div>
      </div>
      <div class="spec">
        <div class="spec-label">大小</div>
        <div class="spec-value">1.7 MB</div>
      </div>
      <div class="spec">
        <div class="spec-label">系统</div>
        <div class="spec-value">Android 7+</div>
      </div>
      <div class="spec">
        <div class="spec-label">收费</div>
        <div class="spec-value">免费</div>
      </div>
    </div>

    <div class="dl-wrap">
      <a class="btn" href="./app-release.apk" download="银杏.apk">
        <span>下载 APK</span>
        <span class="btn-right">
          <span>1.7 MB</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </span>
      </a>
      <p class="hint">安装前请在「设置 → 安全」中开启允许安装未知来源应用</p>
    </div>

    <div class="foot">
      <span>© 2026 巴建峰</span>
      <a href="https://github.com/bjfwan/yinxing" target="_blank">GitHub</a>
    </div>

  </div>
</body>
</html>
